<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Minu blogi</title>
  <link rel="stylesheet" href="/css/xz.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="background-image" style="overflow-y: auto;">

<nav class="tm-nav">
  <div class="tm-nav__inner container-fluid px-4">
    <a href="index.html" class="tm-logo">
      <span class="tm-logo__mark">⌁</span>
      <span class="tm-logo__text">kasuta</span>
    </a>

    <div class="tm-nav__links">
      <a class="tm-link" href="index.html">Главная</a>
      <a class="tm-link" href="#">Каталог</a>
      <a class="tm-link" href="#">О нас</a>
      <a class="tm-link" href="#">Контакты</a>
    </div>

    <div class="tm-nav__actions">
      <button type="button" class="tm-icon-btn" aria-label="Favorites">♡</button>
      <button type="button" class="tm-icon-btn" aria-label="Cart">🛒</button>

      <a class="tm-pill tm-pill--ghost nav-login" href="registr.html">Регистрация</a>
      <a class="tm-pill tm-pill--ghost nav-login" href="login.html">Вход</a>
      <a class="tm-pill tm-pill--solid nav-profile" style="display:none;" href="profile.html">Профиль</a>
      <button type="button" class="tm-icon-btn tm-icon-btn--logout nav-logout" data-action="logout" aria-label="Logout" style="display:none;">⎋</button>
    </div>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh; padding: 40px 0;">
  <div class="post-card p-4" style="width:450px; border-radius: 20px;">
    <h3 class="text-center mb-4" style="color:#00ff88; font-weight:700;">Create Account</h3>
    <form id="registerForm">
      <div class="mb-3 text-start">
        <label class="form-label ms-1">Full Name</label>
        <input type="text" name="fullname" class="form-control" placeholder="Aleksei Dubtsak" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label ms-1">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label ms-1">City (Linn)</label>
        <input type="text" name="linn" class="form-control" placeholder="Tallinn" required>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3 text-start">
          <label class="form-label ms-1">Password</label>
          <div class="tm-pass">
            <input type="password" id="regPassword" name="password" class="form-control tm-pass__input" placeholder="••••••••" required>
            <button type="button" class="tm-pass__toggle" data-action="toggle-password" data-target="#regPassword" aria-label="Show password" aria-pressed="false">
              <svg class="tm-pass__icon tm-pass__icon--show" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2.5 12s3.6-7 9.5-7 9.5 7 9.5 7-3.6 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
              </svg>
              <svg class="tm-pass__icon tm-pass__icon--hide" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none;">
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M2.5 12s3.6-7 9.5-7c2.1 0 3.9.7 5.4 1.7M21.5 12s-3.6 7-9.5 7c-2.1 0-3.9-.7-5.4-1.7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M10.6 10.6a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="col-md-6 mb-4 text-start">
          <label class="form-label ms-1">Confirm</label>
          <div class="tm-pass">
            <input type="password" id="regConfirm" name="confirm" class="form-control tm-pass__input" placeholder="••••••••" required>
            <button type="button" class="tm-pass__toggle" data-action="toggle-password" data-target="#regConfirm" aria-label="Show password" aria-pressed="false">
              <svg class="tm-pass__icon tm-pass__icon--show" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2.5 12s3.6-7 9.5-7 9.5 7 9.5 7-3.6 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
              </svg>
              <svg class="tm-pass__icon tm-pass__icon--hide" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none;">
                <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M2.5 12s3.6-7 9.5-7c2.1 0 3.9.7 5.4 1.7M21.5 12s-3.6 7-9.5 7c-2.1 0-3.9-.7-5.4-1.7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M10.6 10.6a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" style="color: #000; font-weight: 600;">
        Register Now
      </button>
    </form>
    <p class="text-center mb-0" style="font-size: 0.9rem; color: #ccc;">
      Already have an account?
      <a href="login.html" style="color:#00ff88; text-decoration: none; font-weight: 600;">Login</a>
    </p>
  </div>
</div>
<script src="/js/auth-nav.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
