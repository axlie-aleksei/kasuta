<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Registration</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Aleksei Dubtsak">

  <!-- CSS -->
  <link rel="stylesheet" href="../public/css/xz.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100 background-image">

  <div id="test4" class="card p-4 shadow" style="width: 350px;">

    <h3 class="card-title text-center mb-3 text-white">
      Registration
    </h3>

    <form id="registrationForm" novalidate>

      <div class="mb-3">
        <label for="firstname" class="form-label text-white">Eesnimi</label>
        <input type="text" class="form-control" id="firstname" placeholder="Sisesta eesnimi">
        <div id="firstnameError" class="error-message"></div>
      </div>

      <div class="mb-3">
        <label for="lastname" class="form-label text-white">Perenimi</label>
        <input type="text" class="form-control" id="lastname" placeholder="Sisesta perenimi">
        <div id="lastnameError" class="error-message"></div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label text-white">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Sisesta email">
        <div id="emailError" class="error-message"></div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label text-white">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Sisesta password">
        <div id="passwordError" class="error-message"></div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label text-white">Telefon</label>
        <input type="tel" class="form-control" id="phone" placeholder="Sisesta telefon">
        <div id="phoneError" class="error-message"></div>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label text-white">Kirjeldus</label>
        <textarea class="form-control" id="description" rows="3" placeholder="Kirjuta lühikirjeldus"></textarea>
        <div id="descriptionError" class="error-message"></div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="agree">
        <label class="form-check-label text-white" for="agree">
          Olen nõus
        </label>
        <div id="agreeError" class="error-message"></div>
      </div>

      <div class="d-grid">
        <button type="submit" id="regbtn" class="btn btn-primary">
          Create account
        </button>
      </div>

    </form>

  </div>

</div>

<script src="../public/js/script.js"></script>

</body>
</html>
