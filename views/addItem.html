<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/theme.js"></script>
  <title>Добавить товар — kasuta</title>

  <link rel="stylesheet" href="/css/xz.css">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous">

</head>

<body class="background-image layout-page-scroll">

<nav class="site-nav">
  <div class="site-nav__inner container-fluid px-4">
    <a href="index.html" class="site-logo">
      <span class="site-logo__mark"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 4 19 20H5L12 4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
      <span class="site-logo__text">kasuta</span>
    </a>

    <div class="site-nav__links">
      <a class="site-link" href="index.html">Главная</a>
      <a class="site-link site-link--active" href="catalog.html">Каталог</a>
      <a class="site-link" href="#">О нас</a>
      <a class="site-link" href="#">Контакты</a>
    </div>

    <div class="site-nav__actions">
      <button type="button" class="site-icon-btn" aria-label="Избранное"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 20.5s-6.2-3.9-8.5-7.7c-1.1-1.8.1-4.7 2.8-4.7 1.6 0 2.8.9 3.2 2 .4-1.1 1.6-2 3.2-2 2.7 0 3.9 2.9 2.8 4.7-2.3 3.8-8.5 7.7-8.5 7.7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
      <button type="button" class="site-icon-btn" aria-label="Корзина"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6.5 6h13l-1.5 8.2a2 2 0 0 1-2 1.6H9.2a2 2 0 0 1-1.9-1.3L5.2 4H3" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="19" r="1.3" fill="currentColor"/><circle cx="16" cy="19" r="1.3" fill="currentColor"/></svg></button>

      <a class="site-pill site-pill--solid nav-auth is-hidden" href="addItem.html" aria-label="Добавить товар"><svg class="site-icon-svg site-icon-svg--pill-sm" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Добавить</span></a>
      <a class="site-pill site-pill--ghost nav-login" href="registr.html">Регистрация</a>
      <a class="site-pill site-pill--ghost nav-login" href="login.html">Вход</a>
      <a class="site-pill site-pill--solid nav-profile is-hidden" href="profile.html">Профиль</a>
      <button type="button" class="site-icon-btn site-icon-btn--logout nav-logout is-hidden" data-action="logout" aria-label="Выход"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M10 17V7H5v10h5zm4 0h7v-2.5M17 8.5 21 12l-4 3.5" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
</nav>


<div class="glass-modal is-open" id="addItemModal">
  <div class="glass-modal__backdrop" data-action="close-add-item"></div>
  <div class="glass-modal__panel">
    <div class="glass-modal__header">
      <div class="glass-modal__title">
        <span class="glass-modal__badge"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
        Добавить товар
      </div>
      <button type="button" class="glass-modal__close" aria-label="Закрыть" data-action="close-add-item"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.85" stroke-linecap="round"/></svg></button>
    </div>

    <div class="glass-modal__body">
      <form id="itemForm" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Название товара</label>
          <input type="text" name="title" class="form-control" placeholder="Например: Смартфон ProMax" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea name="description" class="form-control" rows="4" placeholder="Краткое описание товара..."></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Цена (€)</label>
          <input type="number" name="price" class="form-control" placeholder="Например: 19.99" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Город</label>
          <input type="text" name="city" class="form-control" placeholder="Например: Tallinn">
        </div>

        <div class="mb-2">
          <label class="form-label">Фото</label>
          <div class="form-upload">
            <input id="imagesInput" type="file" name="images" class="form-upload__input" multiple accept="image/*">
            <button type="button" class="form-upload__btn" data-action="pick-images" aria-label="Upload photos">
              <svg class="form-upload__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3v10m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 15v3a3 3 0 003 3h10a3 3 0 003-3v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="form-upload__hint">Нажмите, чтобы выбрать фото</div>
          </div>
          <div id="imagePreviews" class="image-previews is-hidden"></div>
        </div>

        <div class="glass-modal__footer">
          <button type="button" class="glass-btn" data-action="close-add-item">Отмена</button>
          <button type="submit" class="glass-btn glass-btn--primary">Добавить товар</button>
        </div>
      </form>
    </div>
  </div>
</div>


<script src="/js/auth-nav.js"></script>
<script src="/js/addItem.js"></script>

</body>
</html>
