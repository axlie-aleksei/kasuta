<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kasuta - Add item</title>

  <link rel="stylesheet" href="/css/xz.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="background-image" style="overflow-y: auto;">

<nav class="tm-nav">
  <div class="tm-nav__inner container-fluid px-4">
    <a href="index.html" class="tm-logo">
      <span class="tm-logo__mark">⌁</span>
      <span class="tm-logo__text">kasuta</span>
    </a>

    <div class="tm-nav__links">
      <a class="tm-link tm-link--active" href="index.html">Главная</a>
      <a class="tm-link" href="#">Каталог</a>
      <a class="tm-link" href="#">О нас</a>
      <a class="tm-link" href="#">Контакты</a>
    </div>

    <div class="tm-nav__actions">
      <button type="button" class="tm-icon-btn" aria-label="Favorites">♡</button>
      <button type="button" class="tm-icon-btn" aria-label="Cart">🛒</button>

      <a class="tm-pill tm-pill--solid nav-auth" style="display:none;" href="addItem.html">+ Добавить</a>
      <a class="tm-pill tm-pill--ghost nav-login" href="registr.html">Регистрация</a>
      <a class="tm-pill tm-pill--ghost nav-login" href="login.html">Вход</a>
      <a class="tm-pill tm-pill--solid nav-profile" style="display:none;" href="profile.html">Профиль</a>
      <button type="button" class="tm-icon-btn tm-icon-btn--logout nav-logout" data-action="logout" aria-label="Logout" style="display:none;">⎋</button>
    </div>
  </div>
</nav>


<div class="km-modal" id="addItemModal">
  <div class="km-modal__backdrop" data-action="close-add-item"></div>
  <div class="km-modal__panel">
    <div class="km-modal__header">
      <div class="km-modal__title">
        <span class="km-dot">＋</span>
        Добавить товар
      </div>
      <button type="button" class="km-modal__close" aria-label="Close" data-action="close-add-item">×</button>
    </div>

    <div class="km-modal__body">
      <form id="itemForm" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Название товара</label>
          <input type="text" name="title" class="form-control" placeholder="Например: Смартфон ProMax" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Описание</label>
          <textarea name="description" class="form-control" rows="4" placeholder="Краткое описание товара..."></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Цена (€)</label>
          <input type="number" name="price" class="form-control" placeholder="Например: 19.99" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Город</label>
          <input type="text" name="city" class="form-control" placeholder="Например: Tallinn">
        </div>

        <div class="mb-2">
          <label class="form-label">Фото</label>
          <input type="file" name="images" class="form-control" multiple accept="image/*">
        </div>

        <div class="km-modal__footer">
          <button type="button" class="km-btn" data-action="close-add-item">Отмена</button>
          <button type="submit" class="km-btn km-btn--primary">Добавить товар</button>
        </div>
      </form>
    </div>
  </div>
</div>


<script src="/js/auth-nav.js"></script>
<script src="/js/addItem.js"></script>

</body>
</html>
