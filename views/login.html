<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/js/theme.js"></script>
  <title>Вход — kasuta</title>
  <link rel="stylesheet" href="/css/xz.css">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous">
</head>
<body class="background-image layout-page-scroll">

<nav class="site-nav">
  <div class="site-nav__inner container-fluid px-4">
    <a href="index.html" class="site-logo">
      <span class="site-logo__mark"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 4 19 20H5L12 4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></span>
      <span class="site-logo__text">kasuta</span>
    </a>

    <div class="site-nav__links">
      <a class="site-link" href="index.html">Главная</a>
      <a class="site-link" href="catalog.html">Каталог</a>
      <a class="site-link" href="#">О нас</a>
      <a class="site-link" href="#">Контакты</a>
    </div>

    <div class="site-nav__actions">
      <button type="button" class="site-icon-btn" aria-label="Избранное"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 20.5s-6.2-3.9-8.5-7.7c-1.1-1.8.1-4.7 2.8-4.7 1.6 0 2.8.9 3.2 2 .4-1.1 1.6-2 3.2-2 2.7 0 3.9 2.9 2.8 4.7-2.3 3.8-8.5 7.7-8.5 7.7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
      <button type="button" class="site-icon-btn" aria-label="Корзина"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6.5 6h13l-1.5 8.2a2 2 0 0 1-2 1.6H9.2a2 2 0 0 1-1.9-1.3L5.2 4H3" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="19" r="1.3" fill="currentColor"/><circle cx="16" cy="19" r="1.3" fill="currentColor"/></svg></button>

      <a class="site-pill site-pill--ghost nav-login" href="registr.html">Регистрация</a>
      <a class="site-pill site-pill--ghost nav-login" href="login.html">Вход</a>
      <a class="site-pill site-pill--solid nav-profile is-hidden" href="profile.html">Профиль</a>
      <button type="button" class="site-icon-btn site-icon-btn--logout nav-logout is-hidden" data-action="logout" aria-label="Выход"><svg class="site-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M10 17V7H5v10h5zm4 0h7v-2.5M17 8.5 21 12l-4 3.5" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
</nav>

<div class="container layout-auth-center">
  <div class="post-card p-4 layout-auth-card layout-auth-card--login">
    <h3 class="text-center mb-4 page-heading-accent">Вход</h3>
    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="form-label ms-1">Email</label>
        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label ms-1">Пароль</label>
        <div class="site-pass">
          <input type="password" id="password" class="form-control site-pass__input" placeholder="••••••••" required>
          <button type="button" class="site-pass__toggle" data-action="toggle-password" aria-label="Показать пароль" aria-pressed="false">
            <svg class="site-pass__icon site-pass__icon--show" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M2.5 12s3.6-7 9.5-7 9.5 7 9.5 7-3.6 7-9.5 7-9.5-7-9.5-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg class="site-pass__icon site-pass__icon--hide is-hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M2.5 12s3.6-7 9.5-7c2.1 0 3.9.7 5.4 1.7M21.5 12s-3.6 7-9.5 7c-2.1 0-3.9-.7-5.4-1.7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M10.6 10.6a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 mb-3 btn-primary-muted">
        Войти
      </button>
    </form>
    <p class="text-center mb-0 auth-helper-text">
      Нет аккаунта?
      <a href="registr.html" class="link-accent-inline">Регистрация</a>
    </p>
  </div>
</div>
<script src="/js/auth-nav.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
