<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Minu blogi</title>
  <link rel="stylesheet" href="css/xz.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="background-image" style="overflow-y: auto;">

<nav class="navbar-glass">
  <a href="index.html" class="logo">Minu blogi</a>
  <ul class="menu">
    <li><a href="login.html" style="color:#00ff88;">Login</a></li>
    <li><a href="index.html">Avaleht</a></li>
    <li><a href="profile.html">Profile</a></li>
  </ul>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh; padding: 20px 0;">
  <div class="post-card p-4" style="width:380px; border-radius: 20px;">
    <h3 class="text-center mb-4" style="color:#00ff88; font-weight:700;">Login</h3>
    <form>
      <div class="mb-3 text-start">
        <label class="form-label ms-1">Email</label>
        <input type="email" class="form-control" placeholder="name@example.com">
      </div>
      <div class="mb-4 text-start">
        <label class="form-label ms-1">Password</label>
        <input type="password" class="form-control" placeholder="••••••••">
      </div>
      <button class="btn btn-primary w-100 py-2 mb-3" style="color: #000; font-weight: 600;">
        Sign In
      </button>
    </form>
    <p class="text-center mb-0" style="font-size: 0.9rem; color: #ccc;">
      Don't have an account?
      <a href="registr.html" style="color:#00ff88; text-decoration: none; font-weight: 600;">Register</a>
    </p>
  </div>
</div>

</body>
</html>
